  - {type: punctuation, offset: 2535, content: 「, id: KR6j0308_T_001-bkkpn263}
  - {type: variant, offset: 2535, length: 154, content: '「唵迦羅＋（二）細註【乙】羅【大】，羅二【乙】羅羅二吒抧吽弱娑嚩二合合引訶」

      「北方地下一大藥叉將真言曰：

      「唵塢波迦羅吒抧吽弱娑嚩二合引訶訶引三」

      「次於上方四隅舍上各帖怗貼一大藥叉將真言。

      「東北隅舍上一大藥叉將真言曰：

      「唵蘇哩也二合＋（二）【乙】合【大】，合二【乙】合合二吒抧吽弱娑嚩二合引訶訶引三」

      「東南隅舍上一大藥叉將真言曰：

      「唵阿銀儞二合＋（二）【乙】合【大】，合二【乙】合合二吒抧吽弱娑嚩二合引訶訶引三」

      「西南隅舍上一大藥叉將真言曰：

      「唵蘇摩吒抧吽弱娑嚩二合引訶引引三」

      「西北隅舍上一大藥叉將真言曰：', 甲: ''}
