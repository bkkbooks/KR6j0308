body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯爾時婆伽梵住極樂世界與諸大眾宣說妙法時金剛手菩薩從座而起偏袒右肩雙膝著地頂禮觀自在菩薩摩訶薩足白觀自在菩薩言聖者住大悲解脫如幻三昧能除一切有情苦惱與世出世利益安樂假使三千大千世界一切眾生同時有種種苦惱及八難苦或希望世間出世果報若能一心稱念觀自在菩薩摩訶薩名號應時不捨大悲誓願即現種種隨類之身能滿眾生一切勝願亦能護持國界拔濟苦難亦能攝受養育增長吉祥亦能遮止囚禁苦形亦能銷除蠱毒鬼魅及諸惡病亦能臨陣禁制刀杖亦能消除水火災難亦能斷除禱呪詛亦能結護方隅地界唯願聖者哀愍未來一切有情國王男女若淨信三寶護持佛法相承王業勿令斷絕為彼等故說軌儀陀羅尼加持方便爾時觀自在菩薩摩訶薩從座而起頂禮佛足右遶三匝還坐本處合掌向佛而白佛言唯願世尊哀愍加持我有葉衣觀自在菩薩摩訶薩陀羅尼能除一切有情災禍疫疾飢儉劫賊刀兵水旱不調宿曜失序亦能增長福德國界豐盛人民安樂我今欲說唯願聽許佛言善哉善哉隨汝意說爾時觀自在菩薩承佛威神而說陀羅尼曰曩謨囉怛曩二合怛囉二合夜引野一曩謨阿弭跢引婆去引野二怛他去引蘖跢引夜引囉賀二合帝三去藐三去沒馱引野三曩謨阿去引哩野二合引嚩路引枳帝濕嚩二合囉野四地薩怛嚩二合引野五摩訶薩怛嚩二合引野六摩賀迦引嚕抳尼整反迦引野七曩謨摩賀娑他二合去引麼鉢囉二合引跛跢二合引野八地薩怛嚩二合引野九摩賀薩怛嚩二合野十摩賀迦魯抳尼整反迦引野十一嚩引麼寧怛鑁二合引曩麼寫去引弭十二怛鑁二合引曩麼寫去引弭嚩引麼寧十三妣舍止鉢囉二合拏捨嚩哩十四鉢囉二合拏捨嚩哩妣舍止十五婆去誐嚩底丁以反十六跛捨跛囉輸上播捨馱哩抳十七夜引𩕳迦𩕳質十八婆去夜引𩕳聿二合答跛二合儞也二合麼引曩引𩕳聿二合答跛二合撚帝十九夜引入迦引室質二合儞泥以反多庾二十引夜引入迦引室質二合怛麼二合哩庾二十一夜引迦引室質二合摩賀引麼引哩庾二合二十二曳計質弩鉢捺囉二合嚩無跛反二十三曳計質弩播引夜引娑引入二十四曳計質捺地野二合引婆嚩准上引二十五曳計質弩跛薩虐引二十六塢跛薩誐三去滿馱引嚩引二十七嗢鉢撚帝二十八薩嚩引𩕳跢引𩕳薩嚩引娑嚲二合引二十九薩吠帝嚩引攞多三十噎武無後反鉢撚帝曩三十一半旎多娑多二合娜𡩋曩薩底曳二合三十二薩底也二合嚩引計引曩三十三惹自娜反惹惹惹三十四曀鼻室止二合半旎跢引三十五地瑟恥二合帶引漫怛囉二合鉢乃引三十六麼鼻聲麼准上薩嚩薩怛縛二合引難上者三十七囉迦愴二合引矩嚕三十八麌不井二合矩嚕三十九跛哩怛囉二合引喃矩嚕四十跛哩囉二合怛上矩嚕四十一跛哩播引攞曩矩嚕四十二扇引井矩嚕四十三娑嚕二合娑底野三合野曩矩嚕四十四難上拏跛哩賀引𠻴矩嚕四十五設娑怛囉三合跛哩賀𠻴矩嚕四十六尾灑怒引灑南矩嚕四十七尾灑曩引捨曩矩嚕四十八枲引麼引滿蕩矩嚕四十九馱囉抳滿蕩左矩嚕五十怛儞也二合他去引五十一阿密哩二合帝阿蜜哩二合姤納婆二合吠五十二阿濕嚩二合娑黨二合引霓五十三麼鼻聲引麼囉麼同前引麼囉五十四捨麼鉢囉二合捨麼五十五覩奴鼻聲尾覩奴准前五十六覩黎覩母黎娑嚩二合賀心真言曰唵一鉢囉二合拏捨嚩哩二吽發吒半聲三時觀自在菩薩說此陀羅尼已白佛言世尊若善男子善女人誦此陀羅尼一遍即護自身若誦兩遍即護伴侶若誦三遍能護一家若誦四遍護一聚落若誦五遍護一國界若國內疫病流行應取白㲲闊一肘半長二肘先令畫人潔淨齋戒以瞿摩夷汁和少青碌以香膠和勿用皮膠取鬼宿日畫葉衣觀自在菩薩像其像作天女形首戴寶冠冠有無量壽佛瓔珞環釧莊嚴其身身有圓光火焰圍遶像有四臂右第一手當心持吉祥菓第二手作施願手左第一手持鉞斧第二手持羂索坐蓮華上畫像成已懸於竿上令一人執持執竿之人無間斷誦葉衣觀自在菩薩陀羅尼聲鼓鳴磬所擊之杖用樀枳王真言加持二十一遍方乃擊之真言曰唵樀枳吽短聲弱又令二人誦讚一人誦吉慶讚一人誦吉祥讚令知法弟子三五人一人持香爐燒安悉香其香以葉衣觀自在菩薩心真言加持一百八遍然後取燒香煙勿令斷絕一人持賢瓶滿盛香水插華菓樹枝令持瓶人在前先行引像二人吹䗍引入王宮有旋一匝南門而出復從東入却遶城內坊市一匝便城南門出城南門外置一大水瓶於中置種種飲食雜菓及阿闍梨誦妙色身如來真言加持七遍然後誦葉衣觀自在菩薩陀羅尼七遍於真言句中稱國王名號加持願國王界無諸災難然後於路側曠野棄擲水瓶令破作是告言閻魔界中行病鬼等汝等受領此飲食復道而歸於諸有情起大慈心令此國界無諸災難又法欲求長壽無病者隨意大小㲲上畫葉衣觀自在菩薩像於施願手下畫彼男女其像置道場中每日香華飲食旋繞供養發願常得加持滿其所願又法若國王男女難長難養或短壽疾病纏眠寢食不安皆由宿業因緣生惡宿直或數被五曜陵逼本宿令身不安則於所居之處用牛黃或紙或素上書二十八大藥叉將真言帖四壁上先於東方壁上帖四大藥叉將真言從東北角起首所謂第一藥叉將真言曰唵儞引囉伽二合吒抧吽弱娑嚩二合引訶第二藥叉將真言曰唵蘇寗怛囉二合吒抧吽弱娑嚩二合訶第三藥叉將真言曰唵布囉拏二合迦吒抧吽弱娑嚩二合訶第四藥叉將真言曰唵迦比攞吒抧吽弱娑嚩二合訶次於南方壁上貼四大藥叉將真言第一藥叉將真言曰唵僧伽吒抧吽弱娑嚩二合引訶引第二藥叉將真言曰唵塢波僧伽吒抧吽弱娑嚩二合引訶引第三藥叉將真言曰唵啇企羅吒抧吽弱娑嚩二合引訶引第四藥叉將真言曰唵難上娜上吒抧吽弱娑嚩二合引訶引次於西方壁上帖四大藥叉將真言第一藥叉將真言曰唵訶哩吒抧吽弱娑嚩二合引訶第二藥叉將真言曰唵訶哩計奢吒抧吽弱娑嚩二合引訶引第三藥叉將真言曰唵鉢囉二合僕吒抧吽弱娑嚩二合引訶引第四藥叉將真言曰唵迦比羅吒抧吽弱娑嚩二合引訶引次於北方壁上帖四大藥叉將真言第一藥叉將真言曰唵馱邏拏吒抧吽弱娑嚩二合引訶引第二藥叉將真言曰唵馱邏難上那吒抧吽弱娑嚩二合引訶第三藥叉將真言曰唵塢儞庾二合誐跛羅吒抧吽弱娑嚩二合引訶第四藥叉將真言曰唵尾灑弩吒抧吽弱娑嚩二合引訶次於東北隅帖一大藥叉將真言曰唵半支迦吒抧吽弱娑嚩二合訶引次於東南隅帖一大藥叉將真言曰唵半左引羅巘拏吒抧吽弱娑嚩二合引訶引次於西南隅帖一大藥叉將真言曰唵娑上跢儗哩吒抧吽弱娑嚩二合訶引次於西北隅帖一大藥叉將真言曰唵害麼嚩多吒抧吽弱娑嚩二合引訶次於下方足不踏處石上鐫四大藥叉將真言置於四方地下東方地下一大藥叉將真言曰唵步莫吒抧吽弱娑嚩二合訶南方地下一大藥叉將真言曰唵蘇步莫吒抧吽弱娑嚩二合訶西方地下一大藥叉將真言曰唵迦羅吒抧吽弱娑嚩二合訶北方地下一大藥叉將真言曰唵塢波迦羅吒抧吽弱娑嚩二合引訶次於上方四隅舍上各帖一大藥叉將真言東北隅舍上一大藥叉將真言曰唵蘇哩也二合吒抧吽弱娑嚩二合引訶東南隅舍上一大藥叉將真言曰唵阿銀儞二合吒抧吽弱娑嚩二合引訶西南隅舍上一大藥叉將真言曰唵蘇摩吒抧吽弱娑嚩二合引訶引西北隅舍上一大藥叉將真言曰唵嚩庾吒抧吽弱娑嚩二合引訶帖真言已於二十八大藥叉將位各各以香塗一小壇壇上燒香雜華飲食燈燭閼伽虔誠啟告唯願二十八大藥叉將并諸眷屬各住本方護持守護某甲令除災禍不祥疾病夭壽獲得色力增長聰慧威肅端嚴具足易養易長壽命長遠作是加持已二十八大藥叉將不敢違越諸佛如觀自在菩薩及金剛手菩薩教勅晝夜擁護臥安覺安獲大威德若有國王作此法者其王境內災疾消滅國土安寧人民歡樂又法應畫本生宿直每月供養若作如是法者惡宿直轉成吉祥以白檀香刻作葉衣觀自在菩薩像并於樺皮上書此真言共帶若作此法取鬼宿直日受灌頂其灌頂瓶以繒繫項滿盛香水水中著七寶及五種藥所謂娑訶者囉等娑訶泥嚩建吒迦哩勿哩訶底儗哩羯囉拏及五種子諸香等以葉衣觀自在陀羅尼加持一百八遍以用灌頂洗諸障難灌頂已取一瓦椀盛種種飲食彼男女頭上遶三匝令一知法遠送擲破即結線索以葉衣真言加持繫其頭上若作如是法身上疾病鬼魅禱執曜淩逼本命宿所皆悉殄滅又法若人疫病取舍彌木此國無取楮木替之燃火然後酥護摩人髮人骨投一百八遍於火中燒七日已來每日供養葉衣觀自在菩薩護摩之時稱彼國城名聚落名村坊名一切災難悉皆除滅如是象疫馬疫牛疫水牛疫各取本類骨本毛作護摩七日七夜亦皆災滅又法取一瓶滿盛香水誦真言加持一百八遍以水淋彼畜一切疫病悉皆消滅又法若人頭痛取有香氣華加持一百八遍令鼻嗅即得除愈又法若人患鬼魅取粳米粉担作彼魅形以鑌刀誦段段截之七日護摩即得除差又法若人患瘧若一日二日三日乃至七日或長時患瘧用牛黃書此真言戴即得除差又法或嬰孩鬼魅書此真言帶則得除愈又法劫賊侵奪坊市村邑或欲遠遊路畏劫盜取佉陀羅木末護摩誦真言一百八遍所去之處無諸障難又法若虫食苗稼取砂以真言加持一百八遍散於田中虫自遠去五穀豐熟
